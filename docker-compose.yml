version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: furstay-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: furstay_db
    ports:
      - "5433:5432"
    volumes:
      - furstay_postgres_data:/var/lib/postgresql/data

volumes:
  furstay_postgres_data: