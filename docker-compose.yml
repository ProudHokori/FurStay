version: '3.8'
services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: furstay
    ports:
      - "5432:5432"

  adminer: # Database Management GUI
    image: adminer
    restart: always
    ports:
      - "8080:8080"